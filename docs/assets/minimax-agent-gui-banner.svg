      <text x="126" y="84" font-size="18" fill="#c8aaa6">Generate videos</text>
    </g>
    <g transform="translate(1176 304)">
      <rect width="300" height="116" rx="22" fill="#110706" fill-opacity="0.78" stroke="#ff574d" stroke-opacity="0.55"/>
      <circle cx="66" cy="58" r="34" fill="#ff554a" fill-opacity="0.23"/>
      <path d="M51 67V49M67 77V39M83 67V49" stroke="#ffb2aa" stroke-width="8" stroke-linecap="round"/>
      <text x="126" y="52" font-size="28" font-weight="700" fill="#fff4f1">Speech</text>
      <text x="126" y="84" font-size="18" fill="#c8aaa6">TTS and voice tools</text>
    </g>
    <g transform="translate(1164 486)">
      <rect width="300" height="116" rx="22" fill="#110706" fill-opacity="0.78" stroke="#ff574d" stroke-opacity="0.55"/>
      <circle cx="66" cy="58" r="34" fill="#ff554a" fill-opacity="0.23"/>
      <path d="M60 74V42L91 35V65" stroke="#ffb2aa" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="55" cy="77" r="10" fill="#ffb2aa"/>
      <circle cx="86" cy="68" r="10" fill="#ffb2aa"/>
      <text x="126" y="52" font-size="28" font-weight="700" fill="#fff4f1">Music</text>
      <text x="126" y="84" font-size="18" fill="#c8aaa6">Songs and audio</text>
    </g>
