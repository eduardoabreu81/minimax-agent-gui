      <circle cx="66" cy="58" r="34" fill="#ff554a" fill-opacity="0.23"/>
      <path d="M55 43L39 58L55 73M78 43L94 58L78 73" stroke="#ffb2aa" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="126" y="52" font-size="28" font-weight="700" fill="#fff4f1">Code</text>
      <text x="126" y="84" font-size="18" fill="#c8aaa6">Generate and debug</text>
    </g>
    <g transform="translate(84 486)">
      <rect width="300" height="116" rx="22" fill="#110706" fill-opacity="0.78" stroke="#ff574d" stroke-opacity="0.55"/>
      <circle cx="66" cy="58" r="34" fill="#ff554a" fill-opacity="0.23"/>
      <path d="M43 72L59 54L72 66L85 49L95 72H43Z" fill="#ffb2aa"/>
      <text x="126" y="52" font-size="28" font-weight="700" fill="#fff4f1">Image</text>
      <text x="126" y="84" font-size="18" fill="#c8aaa6">Create and iterate</text>
    </g>

