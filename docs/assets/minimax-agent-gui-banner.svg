      <text x="90" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#fff4f1">MCP Tools</text>
      <text x="90" y="68" text-anchor="middle" font-size="16" fill="#c8aaa6">Extend workflows</text>
    </g>
    <g transform="translate(890 682)">
      <rect width="164" height="92" rx="18" fill="#100605" fill-opacity="0.7" stroke="#ff574d" stroke-opacity="0.42"/>
      <text x="82" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#fff4f1">Files</text>
      <text x="82" y="68" text-anchor="middle" font-size="16" fill="#c8aaa6">Upload and manage</text>
    </g>
    <g transform="translate(1086 682)">
      <rect width="164" height="92" rx="18" fill="#100605" fill-opacity="0.7" stroke="#ff574d" stroke-opacity="0.42"/>
      <text x="82" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#fff4f1">History</text>
      <text x="82" y="68" text-anchor="middle" font-size="16" fill="#c8aaa6">Save context</text>
