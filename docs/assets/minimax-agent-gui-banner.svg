      <circle cx="66" cy="58" r="34" fill="#ff554a" fill-opacity="0.23"/>
      <path d="M45 43H75C82 43 88 49 88 56V60C88 67 82 73 75 73H45V43ZM88 55L105 45V71L88 61V55Z" fill="#ffb2aa"/>
