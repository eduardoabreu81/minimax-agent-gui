  <text x="768" y="558" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="92" font-weight="780" letter-spacing="-3" fill="url(#whiteText)">Agent GUI</text>
  <text x="768" y="613" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="400" letter-spacing="0.5" fill="#d8cac7">A modern web interface for MiniMax agents</text>

