  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="356" y="826" width="824" height="82" rx="22" fill="#100605" fill-opacity="0.74" stroke="#ff574d" stroke-opacity="0.44"/>
    <text x="768" y="859" text-anchor="middle" font-size="27" font-weight="650" fill="#fff4f1">All MiniMax capabilities. <tspan fill="#ff5c50">One beautiful interface.</tspan></text>
    <text x="768" y="890" text-anchor="middle" font-size="19" fill="#c8aaa6">Text · Image · Video · Music · Speech · Vision · Code · Search · Tools</text>
    <text x="768" y="970" text-anchor="middle" font-size="19" fill="#a9908c">Powered by MiniMax AI Platform</text>
