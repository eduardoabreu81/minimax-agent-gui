      <rect width="164" height="92" rx="18" fill="#100605" fill-opacity="0.7" stroke="#ff574d" stroke-opacity="0.42"/>
      <text x="82" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#fff4f1">Search</text>
      <text x="82" y="68" text-anchor="middle" font-size="16" fill="#c8aaa6">Web powered</text>
    </g>
    <g transform="translate(678 682)">
