<svg width="1536" height="1024" viewBox="0 0 1536 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MiniMax Agent GUI promotional banner</title>
  <desc id="desc">Dark MiniMax styled promotional banner with coral accents, floating capability cards, and the MiniMax Agent GUI title.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1536" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080202"/>
      <stop offset="0.48" stop-color="#120504"/>
      <stop offset="1" stop-color="#050101"/>
    </linearGradient>
    <linearGradient id="coralText" x1="396" y1="276" x2="1132" y2="452" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff4b3e"/>
      <stop offset="0.45" stop-color="#ff9a8a"/>
      <stop offset="1" stop-color="#fff1ec"/>
    </linearGradient>
    <linearGradient id="whiteText" x1="420" y1="468" x2="1130" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.7" stop-color="#fff8f5"/>
      <stop offset="1" stop-color="#ffb1a5"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(768 405) rotate(90) scale(392 598)">
      <stop stop-color="#ff5c4f" stop-opacity="0.42"/>
      <stop offset="0.42" stop-color="#ff3428" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cornerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(74 892) rotate(-20) scale(456 90)">
      <stop stop-color="#ff493e" stop-opacity="0.9"/>
      <stop offset="0.48" stop-color="#ff4a3e" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#ff4339" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#7a2a20" stroke-opacity="0.24" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>
  <rect width="1536" height="1024" fill="url(#grid)" opacity="0.75"/>
  <rect width="1536" height="1024" fill="url(#centerGlow)"/>
  <rect width="1536" height="1024" fill="url(#cornerGlow)"/>

  <g opacity="0.36" stroke="#ff5a4e" stroke-width="1.2">
    <circle cx="768" cy="392" r="214"/>
    <circle cx="768" cy="392" r="292" opacity="0.65"/>
    <circle cx="768" cy="392" r="378" opacity="0.35"/>
    <path d="M0 895C166 781 303 878 461 822C630 762 709 622 888 650C1100 684 1216 881 1536 748" opacity="0.55"/>
    <path d="M0 938C210 795 322 926 514 855C690 790 773 707 932 718C1126 731 1268 851 1536 812" opacity="0.42"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M664 173C664 148 684 128 709 128C734 128 754 148 754 173V234C754 242 760 248 768 248C776 248 782 242 782 234V136C782 111 802 91 827 91C852 91 872 111 872 136V234C872 242 878 248 886 248C894 248 900 242 900 234V173C900 148 920 128 945 128C970 128 990 148 990 173V257C990 308 949 349 898 349H756C705 349 664 308 664 257V173Z" fill="url(#coralText)" opacity="0.96"/>
    <path d="M616 226V302" stroke="#ff4c42" stroke-width="34" stroke-linecap="round"/>
    <path d="M1038 226V302" stroke="#ffc0b7" stroke-width="34" stroke-linecap="round" opacity="0.82"/>
  </g>

