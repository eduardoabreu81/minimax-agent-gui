<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniMax Agent — All-in-One Platform</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
        })
      }
    </script>
  </head>
  <body style="background:#0f172a;color:#f8fafc;font-family:system-ui,sans-serif;">
    <div id="root"></div>
    <div id="debug-fallback" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#111;color:#0f0;font-family:monospace;padding:20px;z-index:99999;">
      <div>
        <h2 style="color:#0f0;">MiniMax Agent — Loading...</h2>
        <p id="debug-msg">If you see this for more than 3s, check DevTools console (F12)</p>
      </div>
    </div>
    <script>
      setTimeout(() => {
        const root = document.getElementById('root');
        if (!root || root.children.length === 0) {
          document.getElementById('debug-fallback').style.display = 'flex';
          document.getElementById('debug-msg').textContent = 'Root empty after 3s. JS error likely. Open DevTools (F12) → Console.';
        }
      }, 3000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
