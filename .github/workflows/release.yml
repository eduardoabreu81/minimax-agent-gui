# Release workflow.
#
# Builds the desktop app for ubuntu/windows/macos (raw `tauri build`, which
# signs the bundles + emits the `.sig` updater signatures), then attaches the
# installers + signatures to a DRAFT GitHub Release. Review/test the draft,
# then click "Publish release" in the UI to go live.
#
# This is the proven path that successfully built + released before; it does
# NOT yet generate the updater manifest (latest.json) — that lands in a later
# release. The first release needs no manifest (nothing updates from it).
#
# Required GitHub Secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — `tauri signer generate` private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — its passphrase (if one was set)
# macOS code-signing is intentionally off (no Apple Developer ID) — unsigned
# .app/.dmg; users right-click -> Open on first launch.

name: Release desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # Linux needs WebKitGTK + co deps for Tauri to build.
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install npm deps
        working-directory: desktop
        run: npm ci

      # The FastAPI sidecar (PyInstaller onedir) must exist before `tauri build`
      # so tauri.conf.json's bundle.resources can embed it. Built from the repo
      # root with the canonical spec; output lands at <repo>/dist/backend/.
      - name: Build backend sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r web/backend/requirements.txt
          pip install pyinstaller
          pyinstaller desktop/packaging/backend.spec --noconfirm

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri:build
        env:
          # Tauri CLI signs every bundle and emits the `.sig` files used by
          # the updater. macOS APPLE_* signing is intentionally omitted.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: minimax-agent-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/macos/*.app
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/**/*.sig

  release:
    name: Draft GitHub Release
    needs: build
    # Only on a real version tag. workflow_dispatch is a build-only dry-run.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.sig" \) -exec mv {} release/ \;

      # Delete any existing release for this tag first, so re-running a tag
      # doesn't pile new assets on top of old ones (softprops appends, it
      # doesn't replace). The tag itself is kept (no --cleanup-tag).
      - name: Remove stale release for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${{ github.ref_name }}" --yes --repo "${{ github.repository }}" || true

      # Creates a DRAFT release (not public) — review the assets, test the
      # installers, then click "Publish release" in the GitHub UI.
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            release/*
