# Release workflow.
#
# Builds + signs the desktop app for ubuntu/windows/macos and creates a DRAFT
# GitHub Release via tauri-action, which also generates the updater manifest
# (latest.json) and the per-platform updater artifacts (incl. the macOS
# .app.tar.gz). Review/test the draft, then click "Publish release" — once
# published it becomes the "latest" release and installed apps auto-update
# from it (tauri.conf.json plugins.updater endpoint).
#
# Required GitHub Secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — `tauri signer generate` private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — its passphrase (if one was set)
# macOS code-signing is intentionally off (no Apple Developer ID) — unsigned
# .app/.dmg; users right-click -> Open on first launch.

name: Release desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & draft (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      # The FastAPI sidecar (PyInstaller onedir) must exist before tauri-action
      # runs `tauri build`, so tauri.conf.json's bundle.resources can embed it.
      # Output lands at <repo>/dist/backend/.
      - name: Build backend sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r web/backend/requirements.txt
          pip install pyinstaller
          pyinstaller desktop/packaging/backend.spec --noconfirm

      - name: Build, sign & draft release (with updater manifest)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs every bundle + emits the .sig files and latest.json the
          # updater verifies against tauri.conf.json plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          # Only create a release on a real version tag. A workflow_dispatch run
          # is a build-only dry run (empty tagName → no release).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'Download the installer for your platform below. macOS builds are unsigned — right-click → Open on first launch.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
