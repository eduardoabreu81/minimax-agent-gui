# Release workflow.
#
# Builds + signs the desktop app for ubuntu/windows/macos and attaches the
# installers + updater manifest (latest.json) to a single DRAFT GitHub Release.
#
# Why two jobs (create-release → build matrix):
#   tauri-action with releaseDraft + a build matrix races — each OS job can't
#   look a *draft* up by tag, so they each create their own draft (you end up
#   with 2-3 partial drafts, each with an incomplete latest.json). Instead we
#   create ONE draft up front (create-release), then every matrix job uploads
#   to that same release id, and tauri-action merges each platform into the
#   shared latest.json.
#
# Required GitHub Secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — `tauri signer generate` private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — its passphrase (if one was set)
# macOS code-signing is intentionally off (no Apple Developer ID).

name: Release desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create (or recreate) the draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            // Delete any existing release(s) for this tag — including drafts,
            // which can't be found via getReleaseByTag — so re-running a tag
            // never piles up duplicate drafts.
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner, repo: context.repo.repo, per_page: 100,
            });
            for (const r of releases) {
              if (r.tag_name === tag) {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner, repo: context.repo.repo, release_id: r.id,
                });
              }
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: 'Download the installer for your platform below. macOS builds are unsigned — right-click → Open on first launch.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: Build (${{ matrix.os }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      # The FastAPI sidecar (PyInstaller onedir) must exist before tauri-action
      # runs `tauri build`, so tauri.conf.json's bundle.resources can embed it.
      - name: Build backend sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r web/backend/requirements.txt
          pip install pyinstaller
          pyinstaller desktop/packaging/backend.spec --noconfirm

      - name: Build, sign & upload to the draft (with updater manifest)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          # Upload into the single draft created above (no per-OS duplicate).
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
