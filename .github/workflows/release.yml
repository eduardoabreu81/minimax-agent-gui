# Release workflow — builds the desktop app for ubuntu/windows/macos with
# tauri-action, which signs the bundles, generates the updater manifest
# (latest.json), and attaches everything to a GitHub Release.
#
# On a `v*` tag push it creates a DRAFT release: review + test the installers,
# then click "Publish release" in the GitHub UI to go live (which also enables
# the auto-updater, since the updater polls releases/latest/download/latest.json).
# On workflow_dispatch it builds + signs only (no release) — a 3-OS dry-run.
#
# Required GitHub Secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — `tauri signer generate` private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — its passphrase (if one was set)
# macOS code-signing (APPLE_*) is intentionally off — no Apple Developer ID;
# the .app/.dmg ship unsigned (right-click → Open on first launch).

name: Release desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # Linux needs WebKitGTK + co deps for Tauri to build.
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # The FastAPI sidecar (PyInstaller onedir) must exist before the Tauri
      # build so tauri.conf.json's bundle.resources can embed it. Built from
      # the repo root with the canonical spec; output lands at <repo>/dist/backend/.
      - name: Build backend sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r web/backend/requirements.txt
          pip install pyinstaller
          pyinstaller desktop/packaging/backend.spec --noconfirm

      # tauri-action installs the frontend deps, runs the Tauri build, signs the
      # bundles, generates latest.json (the updater manifest), and uploads
      # everything to a draft GitHub Release for the tag.
      - name: Build, sign & draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          # Empty tagName on workflow_dispatch → build + sign only (dry-run).
          # On a v* tag → create/append to that tag's DRAFT release.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'Download the installer for your platform below. macOS builds are unsigned — right-click → Open on first launch.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
